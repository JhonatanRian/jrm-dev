<!-- --- Seção Habilidades (Stack) --- -->
<section id="stack" class="reveal-on-scroll space-y-md md:space-y-lg mt-16">
    <div class="flex justify-center">
        <h2 class="font-headline-xl text-3xl md:text-headline-xl text-center uppercase tracking-tighter transform -rotate-2 inline-block bg-neo-pink text-primary px-sm neo-border border-2">
            Minha Stack
        </h2>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-md md:gap-lg">
        {% for group_stack in portfolio.groups_stacks.all %}
            {% cycle 'bg-neo-blue' 'bg-neo-green' 'bg-neo-yellow' 'bg-neo-purple' 'bg-neo-orange' 'bg-neo-pink' as bg_color silent %}
            {% include 'portfolio/group_stack.html' with group_stack=group_stack bg_color=bg_color %}
        {% endfor %}
    </div>
</section>
