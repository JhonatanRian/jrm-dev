<div class="bg-blue-200 border-2 border-black rounded-lg neo-shadow-sm p-6">
    <h4 class="font-bold text-xl mb-4">{{ group_stack.title }}</h4>
    <div class="flex flex-wrap gap-2">
        {% for stack in group_stack.stacks.all %}
            <span class="font-bold text-black bg-white border-2 border-black rounded-md px-3 py-1">
                {{ stack.name }}
            </span>
        {% endfor %}
    </div>
</div>
