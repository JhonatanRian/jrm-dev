{% load i18n %}
<!-- --- Cabeçalho (Header) --- -->
<nav class="bg-background w-full sticky top-0 z-50 border-b-border-width border-primary transition-colors duration-300">

        <a class="font-headline-md text-xl md:text-headline-md font-black tracking-tighter text-primary uppercase" href="#">

        </a>
        
        <!-- Desktop Nav & Actions -->
        <div class="hidden md:flex gap-md font-label-bold text-label-bold uppercase text-primary items-center">
            <a class="hover:text-neo-pink transition-colors" href="#about">{% translate 'About' %}</a>
