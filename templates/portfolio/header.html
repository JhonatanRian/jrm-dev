{% load i18n %}
<!-- --- Cabeçalho (Header) --- -->
<nav class="bg-background w-full sticky top-0 z-50 border-b-border-width border-primary"
     id="header-nav">
    <div class="header-inner flex justify-between items-center w-full px-sm md:px-md py-sm max-w-7xl mx-auto">
        <a class="font-headline-md text-xl md:text-headline-md font-black tracking-tighter text-primary uppercase"
           href="/">Jhonatan Rian</a>
        <!-- Desktop Nav & Actions -->
        <div class="hidden md:flex gap-md font-label-bold text-label-bold uppercase text-primary items-center">
            <a class="nav-link hover:text-neo-pink transition-colors text-black"
               href="/#sobre">{% translate 'About' %}</a>
            <a class="nav-link hover:text-neo-pink transition-colors text-black"
               href="/#stack">{% translate 'Skills' %}</a>
            <a class="nav-link hover:text-neo-pink transition-colors text-black"
               href="/#projetos">{% translate 'Projects' %}</a>
            <!-- Blog CTA Desktop -->
            <a class="neo-border bg-neo-yellow px-md py-sm neo-shadow neo-button uppercase font-label-bold text-label-bold text-black inline-flex items-center gap-xs"
               href="{% url 'blog:public_list' %}" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-[14px] h-[14px] shrink-0">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <line x1="10" y1="9" x2="8" y2="9"/>
                </svg>
                Blog
            </a>
            <!-- Contato CTA Desktop -->
            <a class="neo-border bg-neo-red px-md py-sm neo-shadow neo-button uppercase font-label-bold text-label-bold text-black inline-flex items-center"
               href="/#contato">{% translate 'Contact' %}</a>
        </div>
        <!-- Mobile Actions -->
        <div class="flex md:hidden items-center gap-sm">
            <a class="neo-border bg-neo-yellow px-sm py-xs neo-shadow-mobile neo-button uppercase font-label-bold text-xs text-black inline-flex items-center gap-xs"
               href="{% url 'blog:public_list' %}" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-[12px] h-[12px] shrink-0">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <line x1="10" y1="9" x2="8" y2="9"/>
                </svg>
                Blog
            </a>
            <a class="neo-border bg-neo-red px-sm py-xs neo-shadow-mobile neo-button uppercase font-label-bold text-xs text-black inline-flex items-center"
               href="/#contato">{% translate 'Contact' %}</a>
        </div>
    </div>
</nav>
