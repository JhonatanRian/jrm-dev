<!-- --- Seção Hero --- -->
<section class="text-center md:text-left">
    <div class="bg-pink-300 border-4 border-black rounded-2xl neo-shadow p-8 md:p-12 grid md:grid-cols-2 gap-8 items-center">
        <div>
            <h1 class="text-5xl md:text-7xl font-black leading-tight">{{ portfolio.section_hero.title }}</h1>
            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mt-2">{{ portfolio.section_hero.subtitle }}</h2>
            <p class="mt-4 text-lg font-semibold">{{ portfolio.section_hero.description }}</p>
            <div class="mt-8 flex justify-center md:justify-start gap-4">
                <a href="{{ portfolio.linkedin }}" target="_blank"
                   class="font-bold text-black bg-white border-2 border-black rounded-lg px-8 py-3 neo-shadow-md neo-button">
                    LinkedIn
                </a>
                <a href="{{ portfolio.github }}" target="_blank"
                   class="font-bold text-black bg-white border-2 border-black rounded-lg px-8 py-3 neo-shadow-md neo-button">
                    GitHub
                </a>
            </div>
        </div>
        <div class="hidden md:block h-96 bg-[#1b2423] border-2 border-black rounded-lg neo-shadow-md code-editor-container">
            <pre><code id="code-editor" class="code-editor p-5"></code></pre>
        </div>
    </div>
</section>
