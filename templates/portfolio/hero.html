<!-- --- Seção Hero --- -->
<section class="reveal-on-scroll neo-border bg-neo-red p-md md:p-xl neo-shadow-mobile md:neo-shadow rounded-lg flex flex-col lg:flex-row items-center gap-md md:gap-xl relative overflow-hidden">
    <div class="w-full lg:w-1/2 z-10 text-center lg:text-left">
        <h1 class="hero-title font-headline-xl text-4xl md:text-headline-xl text-primary mb-sm md:mb-md uppercase">
            {{ portfolio.section_hero.title }}
        </h1>
        <h2 class="font-headline-md text-xl md:text-headline-md bg-white inline-block px-sm neo-border mb-sm md:mb-md text-black">
            {{ portfolio.section_hero.subtitle }}
        </h2>
        <p class="font-body-md md:font-body-lg text-body-md md:text-body-lg text-primary mb-md md:mb-lg bg-white/80 p-sm neo-border text-left text-black">
            {{ portfolio.section_hero.description }}
        </p>
        <div class="flex flex-wrap justify-center lg:justify-start gap-sm md:gap-md">
            <a class="hero-btn neo-border bg-white px-sm md:px-md py-xs md:py-sm neo-shadow-mobile md:neo-shadow neo-button uppercase font-label-bold text-xs md:text-label-bold flex items-center gap-sm text-black" href="{{ portfolio.linkedin }}" target="_blank">
                <span class="material-symbols-outlined text-sm md:text-base">link</span> LinkedIn
            </a>
            <a class="hero-btn neo-border bg-white px-sm md:px-md py-xs md:py-sm neo-shadow-mobile md:neo-shadow neo-button uppercase font-label-bold text-xs md:text-label-bold flex items-center gap-sm text-black" href="{{ portfolio.github }}" target="_blank">
                <span class="material-symbols-outlined text-sm md:text-base">code</span> GitHub
            </a>
        </div>
    </div>
    <div class="w-full lg:w-1/2 z-10">
        <div class="neo-border bg-black rounded-lg neo-shadow-mobile md:neo-shadow overflow-hidden">
            <div class="bg-primary-fixed border-b-4 border-black p-xs md:p-sm flex gap-xs md:gap-sm items-center">
                <div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-neo-pink neo-border border-2"></div>
                <div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-neo-yellow neo-border border-2"></div>
                <div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-neo-green neo-border border-2"></div>
                <span class="font-label-bold text-[10px] md:text-primary ml-sm truncate text-black">terminal - jhonatan@backend: ~</span>
            </div>
            <div class="p-sm md:p-md font-mono text-neo-green text-xs md:text-base leading-relaxed overflow-x-auto min-h-[160px]">
                <div class="whitespace-pre code-editor" id="code-editor"></div>
            </div>
        </div>
    </div>
</section>
