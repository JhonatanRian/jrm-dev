<!-- --- Barra Lateral (Sidebar) --- -->
<aside id="sidebar"
       class="fixed top-0 left-0 h-full bg-[#FFD1DC] p-4 border-black border-r-4 transform transition-all duration-300 ease-in-out z-20 w-72">
    <div class="h-full flex flex-col">
        <div class="flex items-center justify-between mb-10 h-10">
            <h1 class="text-3xl font-black text-black sidebar-header-text whitespace-nowrap">PAINEL</h1>
        </div>
        <nav class="flex-grow overflow-y-auto">

            <a href="{% url 'core:painel' %}"
               class="flex items-center p-2 my-1 rounded-lg transition-all duration-200 hover:bg-gray-200 {% if request.resolver_match.url_name == 'painel' %}bg-yellow-300 text-black shadow-[2px_2px_0px_rgba(0,0,0,1)] border-2 border-black{% else %}opt-menu-selected{% endif %}">
                <i class="material-icons">home</i>
                <span class="ml-4 font-bold sidebar-icon-text">Meu Espaço</span>
            </a>
            
            <!-- Gatilho do Submenu Portfólio -->
            <div class="my-1">
                <button type="button" data-submenu-trigger
                        class="w-full flex items-center justify-between p-2 rounded-lg transition-all duration-200 hover:bg-gray-200 cursor-pointer text-black font-bold focus:outline-none">
                    <div class="flex items-center">
                        <i class="material-icons">work</i>
                        <span class="ml-4 font-bold sidebar-icon-text">Portfólio</span>
                    </div>
                    <svg data-submenu-icon class="w-5 h-5 transition-transform duration-200 sidebar-icon-text" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                    </svg>
                </button>
                <!-- Lista de Links do Submenu -->
                <div data-submenu-list class="hidden mt-1 ml-4 flex flex-col gap-1 border-l-2 border-black pl-4">
                    <a href="{% url 'portfolio:stack_list' %}" class="flex items-center p-2 rounded-lg transition-all duration-200 hover:bg-gray-200 {% if 'stack_' in request.resolver_match.url_name and 'group_stack' not in request.resolver_match.url_name %}bg-yellow-300 text-black shadow-[2px_2px_0px_rgba(0,0,0,1)] border-2 border-black{% endif %}">
                        <i class="material-icons text-xl">layers</i>
                        <span class="ml-3 text-sm font-semibold sidebar-icon-text">Stacks</span>
                    </a>
                    <a href="{% url 'portfolio:group_stack_list' %}" class="flex items-center p-2 rounded-lg transition-all duration-200 hover:bg-gray-200 {% if 'group_stack' in request.resolver_match.url_name %}bg-yellow-300 text-black shadow-[2px_2px_0px_rgba(0,0,0,1)] border-2 border-black{% endif %}">
                        <i class="material-icons text-xl">view_module</i>
                        <span class="ml-3 text-sm font-semibold sidebar-icon-text">Seções Stack</span>
                    </a>
                    <a href="{% url 'portfolio:project_list' %}" class="flex items-center p-2 rounded-lg transition-all duration-200 hover:bg-gray-200 {% if 'project_' in request.resolver_match.url_name %}bg-yellow-300 text-black shadow-[2px_2px_0px_rgba(0,0,0,1)] border-2 border-black{% endif %}">
                        <i class="material-icons text-xl">folder</i>
                        <span class="ml-3 text-sm font-semibold sidebar-icon-text">Projetos</span>
                    </a>
                    <a href="{% url 'portfolio:configuration' %}" class="flex items-center p-2 rounded-lg transition-all duration-200 hover:bg-gray-200 {% if request.resolver_match.url_name == 'configuration' %}bg-yellow-300 text-black shadow-[2px_2px_0px_rgba(0,0,0,1)] border-2 border-black{% endif %}">
                        <i class="material-icons text-xl">settings</i>
                        <span class="ml-3 text-sm font-semibold sidebar-icon-text">Configurações</span>
                    </a>
                </div>
            </div>
        </nav>
        <div class="mt-auto flex-shrink-0">
            <a href="#" class="flex items-center gap-3 p-3 font-bold hover:bg-white/50 rounded-md transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" class="flex-shrink-0">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span class="font-bold whitespace-nowrap sidebar-footer-text">Sair</span>
            </a>
        </div>
    </div>
</aside>
<!-- Botão de Toggle do Sidebar -->
<button id="sidebar-toggle"
        class="fixed top-1/2 -translate-y-1/2 w-10 h-10 bg-black text-white rounded-full border-4 border-white z-30 flex items-center justify-center transition-all duration-300 ease-in-out">
    <svg id="toggle-icon-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5">
        <polyline points="9 18 15 12 9 6"></polyline>
    </svg>
    <svg id="toggle-icon-close" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5" class="hidden">
        <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
</button>
