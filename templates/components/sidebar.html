<!-- --- Barra Lateral (Sidebar) --- -->
<aside id="sidebar"
       class="fixed top-0 left-0 h-full bg-[#FFD1DC] p-4 border-black border-r-4 transform transition-all duration-300 ease-in-out z-20 w-72">
    <div class="h-full flex flex-col">
        <div class="flex items-center justify-between mb-8 h-10">
            <h1 class="text-3xl font-black text-black sidebar-header-text whitespace-nowrap">PAINEL</h1>
        </div>
        <nav class="flex-grow overflow-y-auto space-y-1">

            <a href="{% url 'core:painel' %}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 hover:bg-white/50 {% if request.resolver_match.url_name == 'painel' %}bg-yellow-300 text-black shadow-[2px_2px_0px_rgba(0,0,0,1)] border-2 border-black{% endif %}">
                <i class="material-icons text-[22px]">home</i>
                <span class="font-bold sidebar-icon-text">Meu Espaço</span>
            </a>

            <!-- Gatilho do Submenu Portfólio -->
            <div>
                <button type="button" data-submenu-trigger
                        class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg transition-all duration-200 hover:bg-white/50 cursor-pointer text-black font-bold focus:outline-none">
                    <div class="flex items-center gap-3">
                        <i class="material-icons text-[22px]">work</i>
                        <span class="font-bold sidebar-icon-text">Portfólio</span>
                    </div>
                    <svg data-submenu-icon class="w-4 h-4 transition-transform duration-300 ease-in-out sidebar-icon-text" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                    </svg>
                </button>
                <!-- Lista de Links do Submenu -->
                <div data-submenu-list class="submenu-panel overflow-hidden">
                    <div class="ml-5 mt-1 mb-1 pl-3 border-l-3 border-black/30 space-y-0.5">
                        <a href="{% url 'portfolio:stack_list' %}" class="flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-all duration-200 hover:bg-white/50 {% if 'stack_' in request.resolver_match.url_name and 'group_stack' not in request.resolver_match.url_name %}bg-yellow-300 text-black shadow-[2px_2px_0px_rgba(0,0,0,1)] border-2 border-black font-bold{% else %}text-black/80 font-semibold{% endif %}">
                            <i class="material-icons text-[18px]">layers</i>
                            <span class="sidebar-icon-text">Stacks</span>
                        </a>
                        <a href="{% url 'portfolio:group_stack_list' %}" class="flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-all duration-200 hover:bg-white/50 {% if 'group_stack' in request.resolver_match.url_name %}bg-yellow-300 text-black shadow-[2px_2px_0px_rgba(0,0,0,1)] border-2 border-black font-bold{% else %}text-black/80 font-semibold{% endif %}">
                            <i class="material-icons text-[18px]">view_module</i>
                            <span class="sidebar-icon-text">Seções Stack</span>
                        </a>
                        <a href="{% url 'portfolio:project_list' %}" class="flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-all duration-200 hover:bg-white/50 {% if 'project_' in request.resolver_match.url_name %}bg-yellow-300 text-black shadow-[2px_2px_0px_rgba(0,0,0,1)] border-2 border-black font-bold{% else %}text-black/80 font-semibold{% endif %}">
                            <i class="material-icons text-[18px]">folder</i>
                            <span class="sidebar-icon-text">Projetos</span>
                        </a>
                        <a href="{% url 'portfolio:configuration' %}" class="flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-all duration-200 hover:bg-white/50 {% if request.resolver_match.url_name == 'configuration' %}bg-yellow-300 text-black shadow-[2px_2px_0px_rgba(0,0,0,1)] border-2 border-black font-bold{% else %}text-black/80 font-semibold{% endif %}">
                            <i class="material-icons text-[18px]">settings</i>
                            <span class="sidebar-icon-text">Configurações</span>
                        </a>
                    </div>
                </div>
            </div>
        </nav>
        <div class="mt-auto flex-shrink-0 pt-4 border-t-2 border-black/20">
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 font-bold hover:bg-white/50 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" class="flex-shrink-0">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span class="font-bold whitespace-nowrap sidebar-footer-text">Sair</span>
            </a>
        </div>
    </div>
</aside>
<!-- Botão de Toggle do Sidebar -->
<button id="sidebar-toggle"
        class="fixed top-1/2 -translate-y-1/2 w-10 h-10 bg-black text-white rounded-full border-4 border-white z-30 flex items-center justify-center transition-all duration-300 ease-in-out">
    <svg id="toggle-icon-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5">
        <polyline points="9 18 15 12 9 6"></polyline>
    </svg>
    <svg id="toggle-icon-close" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5" class="hidden">
        <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
</button>
