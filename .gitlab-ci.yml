stages:
  - build_deploy

build_deploy:hml:
  stage: build_deploy
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_DRIVER: overlay2
  before_script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - echo '>>> Building Image...'
    - cp $ENV_STAGING .env
    - docker build -t registry.gitlab.com/jhonatanrian/jrm_dev:homolog .
    - docker push $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - echo '>>> Done !!!'
  only:
    refs:
      - homolog

build_deploy:main:
  stage: build_deploy
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_DRIVER: overlay2
  before_script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - echo " TOKEN CI_JOB_TOKEN"
    - echo $CI_JOB_TOKEN
    - echo '>>> Building Image...'
    - cp $ENV_STAGING .env
    - docker build -t registry.gitlab.com/jhonatanrian/jrm_dev:main .
    - docker push $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - echo '>>> Done !!!'
  only:
    refs:
      - main

