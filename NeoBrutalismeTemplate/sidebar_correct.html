<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Neobrutalista</title>
    <!-- Incluindo o Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estilos personalizados e classes do Neobrutalismo */
        body {
            font-family: 'Inter', sans-serif;
        }
        .neo-shadow {
            box-shadow: 4px 4px 0px rgba(0,0,0,1);
        }
        .neo-shadow-sm {
            box-shadow: 2px 2px 0px rgba(0,0,0,1);
        }
        .neo-button:active:not(:disabled) {
            box-shadow: none;
            transform: translate(4px, 4px);
        }
        .sidebar-icon-text, .sidebar-header-text, .sidebar-footer-text {
            opacity: 1;
            transition: opacity 0.2s ease-in-out;
        }
        .sidebar-collapsed .sidebar-icon-text,
        .sidebar-collapsed .sidebar-header-text,
        .sidebar-collapsed .sidebar-footer-text {
            opacity: 0;
            width: 0;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-[#FDF5E6]">

    <div class="relative min-h-screen">
      <!-- --- Barra Lateral (Sidebar) --- -->
      <aside id="sidebar" class="fixed top-0 left-0 h-full bg-[#FFD1DC] p-4 border-black border-r-4 transform transition-all duration-300 ease-in-out z-20 w-72">
        <div class="h-full flex flex-col">
            <div class="flex items-center justify-between mb-10 h-10">
              <h1 class="text-3xl font-black text-black sidebar-header-text whitespace-nowrap">PAINEL</h1>
            </div>
            <nav class="flex-grow overflow-y-auto">
              <a href="#" class="flex items-center p-3 my-1 rounded-lg transition-all duration-200 bg-yellow-300 text-black shadow-[2px_2px_0px_rgba(0,0,0,1)] border-2 border-black">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="flex-shrink-0"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="ml-4 font-bold whitespace-nowrap sidebar-icon-text">Dashboard</span>
              </a>
              <a href="#" class="flex items-center p-3 my-1 rounded-lg transition-all duration-200 hover:bg-white/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="flex-shrink-0"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                <span class="ml-4 font-bold whitespace-nowrap sidebar-icon-text">Análises</span>
              </a>
              <a href="#" class="flex items-center p-3 my-1 rounded-lg transition-all duration-200 hover:bg-white/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="flex-shrink-0"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <span class="ml-4 font-bold whitespace-nowrap sidebar-icon-text">Clientes</span>
              </a>
              <a href="#" class="flex items-center p-3 my-1 rounded-lg transition-all duration-200 hover:bg-white/50">
                 <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="flex-shrink-0"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                <span class="ml-4 font-bold whitespace-nowrap sidebar-icon-text">Projetos</span>
              </a>
              <a href="#" class="flex items-center p-3 my-1 rounded-lg transition-all duration-200 hover:bg-white/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="flex-shrink-0"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 0 2l-.15.08a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l-.22-.38a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1 0-2l.15-.08a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <span class="ml-4 font-bold whitespace-nowrap sidebar-icon-text">Configurações</span>
              </a>
            </nav>
            <div class="mt-auto flex-shrink-0">
                 <a href="#" class="flex items-center gap-3 p-3 font-bold hover:bg-white/50 rounded-md transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="flex-shrink-0"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    <span class="font-bold whitespace-nowrap sidebar-footer-text">Sair</span>
                </a>
            </div>
        </div>
      </aside>
       <!-- Botão de Toggle do Sidebar -->
      <button id="sidebar-toggle" class="fixed top-1/2 -translate-y-1/2 w-10 h-10 bg-black text-white rounded-full border-4 border-white z-30 flex items-center justify-center transition-all duration-300 ease-in-out">
          <svg id="toggle-icon-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
          <svg id="toggle-icon-close" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="hidden"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>

      
      <!-- --- Conteúdo Principal --- -->
      <main id="main-content" class="p-4 sm:p-6 lg:p-8 transition-all duration-300 ease-in-out">
        
        <!-- --- Header do Dashboard --- -->
        <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8">
            <div>
                <h2 class="text-3xl font-bold">Olá, Bem-vindo(a)! 👋</h2>
                <p class="text-gray-600">Explore os componentes de formulário.</p>
            </div>
        </header>

        <!-- --- Seção de Formulários --- -->
        <div class="bg-white p-6 border-2 border-black rounded-xl neo-shadow">
            <h3 class="text-2xl font-bold mb-6">Componente: Formulários</h3>
            <p>O conteúdo da sua página principal vai aqui...</p>
        </div>

      </main>
    </div>

    <script>
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('main-content');
      const sidebarToggle = document.getElementById('sidebar-toggle');
      const toggleIconOpen = document.getElementById('toggle-icon-open');
      const toggleIconClose = document.getElementById('toggle-icon-close');

      const COLLAPSED_WIDTH = 'w-20';
      const EXPANDED_WIDTH = 'w-72';
      
      const toggleSidebar = () => {
        sidebar.classList.toggle('sidebar-collapsed');
        if (sidebar.classList.contains('sidebar-collapsed')) {
            sidebar.classList.remove(EXPANDED_WIDTH);
            sidebar.classList.add(COLLAPSED_WIDTH);
            mainContent.style.marginLeft = '80px';
            sidebarToggle.style.left = '60px';
            toggleIconOpen.classList.remove('hidden');
            toggleIconClose.classList.add('hidden');
        } else {
            sidebar.classList.remove(COLLAPSED_WIDTH);
            sidebar.classList.add(EXPANDED_WIDTH);
            mainContent.style.marginLeft = '288px';
            sidebarToggle.style.left = '268px';
            toggleIconOpen.classList.add('hidden');
            toggleIconClose.classList.remove('hidden');
        }
      };

      if (sidebarToggle) {
          sidebarToggle.addEventListener('click', toggleSidebar);
      }

      // Estado inicial (Expandido)
      sidebar.classList.remove(COLLAPSED_WIDTH);
      sidebar.classList.add(EXPANDED_WIDTH);
      mainContent.style.marginLeft = '288px'; // 72*4
      sidebarToggle.style.left = '268px'; // 288 - 20
      toggleIconOpen.classList.add('hidden');
      toggleIconClose.classList.remove('hidden');

    </script>
</body>
</html>
