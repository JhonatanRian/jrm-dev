version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jrm_dev_web
    volumes:
      - .:/app
    expose:
      - 8000
    networks:
      - public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jrm_dev.rule=Host(`jrmdev.com.br`)"
      - "traefik.http.routers.jrm_dev.entrypoints=websecure"
      - "traefik.http.services.jrm_dev.loadbalancer.server.port=8000"
      - "traefik.http.routers.jrm_dev.tls.certresolver=myresolver"

networks:
  public:
    name: public
    driver: overlay

