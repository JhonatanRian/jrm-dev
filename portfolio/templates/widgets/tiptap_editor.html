<div class="tiptap-editor-container">
    {% include "django/forms/widgets/textarea.html" %}

    <!-- Google Fonts for Editor Preview -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;600;700;900&family=Outfit:wght@400;500;800;900&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Modal Dialog for Link Insertion/Editing -->
    <dialog id="tiptap-link-modal-{{ widget.attrs.id }}"
            class="border-4 border-black p-6 w-96 max-w-[90vw] bg-white shadow-[8px_8px_0_0_rgba(0,0,0,1)] rounded-sm focus:outline-none backdrop:bg-black/40 backdrop:backdrop-blur-sm z-50">
        <div class="flex flex-col gap-4">
            <h3 class="font-black text-lg border-b-2 border-black pb-2 text-black">Inserir / Editar Link</h3>
            <div class="flex flex-col gap-1">
                <label for="tiptap-link-text-{{ widget.attrs.id }}" class="font-bold text-xs text-black uppercase tracking-wider">Texto a Exibir</label>
                <input type="text"
                       id="tiptap-link-text-{{ widget.attrs.id }}"
                       class="border-2 border-black p-2 font-semibold text-sm focus:outline-none focus:bg-[#FEF08A] bg-white text-black rounded-sm"
                       placeholder="Texto do link">
            </div>
            <div class="flex flex-col gap-1">
                <label for="tiptap-link-url-{{ widget.attrs.id }}" class="font-bold text-xs text-black uppercase tracking-wider">URL do Link</label>
                <input type="text"
                       id="tiptap-link-url-{{ widget.attrs.id }}"
                       class="border-2 border-black p-2 font-semibold text-sm focus:outline-none focus:bg-[#FEF08A] bg-white text-black rounded-sm"
                       placeholder="https://exemplo.com">
            </div>
            <div class="flex gap-2 justify-end mt-2">
                <button type="button"
                        id="tiptap-link-cancel-{{ widget.attrs.id }}"
                        class="px-4 py-2 border-2 border-black font-bold text-xs bg-white text-black shadow-[2px_2px_0_0_rgba(0,0,0,1)] active:translate-y-[1px] active:translate-x-[1px] active:shadow-none transition-all rounded-sm">
                    Cancelar
                </button>
                <button type="button"
                        id="tiptap-link-save-{{ widget.attrs.id }}"
                        class="px-4 py-2 border-2 border-black font-bold text-xs bg-[#BBF7D0] text-black shadow-[2px_2px_0_0_rgba(0,0,0,1)] active:translate-y-[1px] active:translate-x-[1px] active:shadow-none transition-all rounded-sm">
                    Salvar
                </button>
            </div>
        </div>
    </dialog>

    <div class="tiptap-editor-mount w-full border-4 border-black bg-[#E2E8F0] shadow-[4px_4px_0_0_rgba(0,0,0,1)] rounded-sm mb-4 mt-2">
        <!-- Compact Toolbar -->
        <div class="tiptap-toolbar flex flex-wrap items-center gap-1.5 p-1.5 bg-[#F1F5F9] border-b-4 border-black select-none">
            
            <!-- Group 1: History (Undo/Redo) -->
            <div class="flex items-center gap-1">
                <button type="button"
                        data-tiptap-cmd="undo"
                        title="Desfazer (Ctrl+Z)"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"></path>
                    </svg>
                </button>
                <button type="button"
                        data-tiptap-cmd="redo"
                        title="Refazer (Ctrl+Y)"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 15l6-6m0 0l-6-6m6 6H9a6 6 0 000 12h3"></path>
                    </svg>
                </button>
            </div>

            <span class="w-[2px] h-6 bg-black/20 self-center mx-0.5"></span>

            <!-- Group 2: Format & Font Dropdowns -->
            <div class="flex items-center gap-1.5">
                <!-- Block Dropdown -->
                <div class="relative inline-block text-left tiptap-dropdown">
                    <button type="button"
                            id="tiptap-block-btn-{{ widget.attrs.id }}"
                            class="tiptap-block-btn min-w-[110px] px-2.5 py-1.5 bg-white border-2 border-black font-bold text-xs text-black shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-between gap-1"
                            aria-haspopup="true"
                            aria-expanded="false">
                        <span class="tiptap-block-label">Parágrafo</span>
                        <svg class="tiptap-chevron w-3 h-3 text-black transition-transform duration-200" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div id="tiptap-block-menu-{{ widget.attrs.id }}"
                         class="tiptap-dropdown-menu hidden absolute left-0 mt-1 w-36 bg-white border-2 border-black shadow-[3px_3px_0_0_rgba(0,0,0,1)] z-50 flex flex-col p-1 gap-1">
                        <button type="button" data-tiptap-block="paragraph" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center">
                            <span>Parágrafo</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                        <button type="button" data-tiptap-block="h1" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center">
                            <span>Título 1</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                        <button type="button" data-tiptap-block="h2" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center">
                            <span>Título 2</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                        <button type="button" data-tiptap-block="h3" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center">
                            <span>Título 3</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                        <button type="button" data-tiptap-block="h4" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center">
                            <span>Título 4</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                        <button type="button" data-tiptap-block="h5" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center">
                            <span>Título 5</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                    </div>
                </div>

                <!-- Font Dropdown -->
                <div class="relative inline-block text-left tiptap-dropdown">
                    <button type="button"
                            id="tiptap-font-btn-{{ widget.attrs.id }}"
                            class="tiptap-font-btn min-w-[120px] px-2.5 py-1.5 bg-white border-2 border-black font-bold text-xs text-black shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-between gap-1"
                            aria-haspopup="true"
                            aria-expanded="false">
                        <span class="tiptap-font-label">Fonte Padrão</span>
                        <svg class="tiptap-chevron w-3 h-3 text-black transition-transform duration-200" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div id="tiptap-font-menu-{{ widget.attrs.id }}"
                         class="tiptap-dropdown-menu hidden absolute left-0 mt-1 w-44 bg-white border-2 border-black shadow-[3px_3px_0_0_rgba(0,0,0,1)] z-50 flex flex-col p-1 gap-1">
                        <button type="button" data-tiptap-font="default" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center font-sans">
                            <span>Padrão</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                        <button type="button" data-tiptap-font="Outfit" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center" style="font-family: 'Outfit', sans-serif;">
                            <span>Outfit (Neo)</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                        <button type="button" data-tiptap-font="Inter" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center" style="font-family: 'Inter', sans-serif;">
                            <span>Inter (Explicar)</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                        <button type="button" data-tiptap-font="Space Grotesk" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center" style="font-family: 'Space Grotesk', sans-serif;">
                            <span>Space Grotesk</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                        <button type="button" data-tiptap-font="JetBrains Mono" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center" style="font-family: 'JetBrains Mono', monospace;">
                            <span>JetBrains (Código)</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                    </div>
                </div>
            </div>

            <span class="w-[2px] h-6 bg-black/20 self-center mx-0.5"></span>

            <!-- Group 3: Formatting Marks (Bold, Italic, Strike, Link, Highlight, Blockquote) -->
            <div class="flex items-center gap-1">
                <button type="button"
                        data-tiptap-cmd="bold"
                        title="Negrito (Ctrl+B)"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3.75h6.75a3.75 3.75 0 010 7.5H6.75m0-7.5v16.5m0-16.5h7.5a3.75 3.75 0 010 7.5H6.75m0 0h8.25a3.75 3.75 0 010 7.5H6.75"></path>
                    </svg>
                </button>
                <button type="button"
                        data-tiptap-cmd="italic"
                        title="Itálico (Ctrl+I)"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 4.5h-10m6 15h-10m7.5-15l-3 15"></path>
                    </svg>
                </button>
                <button type="button"
                        data-tiptap-cmd="strike"
                        title="Tachado"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 9c0-1.5 1.5-3 3-3s3 1.5 3 3-1.5 3-3 3M9 15c0-1.5 1.5-3 3-3s3 1.5 3 3-1.5 3-3 3m-9-3h18"></path>
                    </svg>
                </button>
                <button type="button"
                        data-tiptap-link-trigger
                        title="Inserir/Editar Link (Ctrl+K)"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"></path>
                    </svg>
                </button>
                <button type="button"
                        data-tiptap-cmd="blockquote"
                        title="Citação"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M9.983 3v7.391c0 5.704-3.731 9.57-8.983 10.609l-.995-2.151c2.432-.917 3.995-2.638 3.995-5.17h-4v-10.679h9.983zm14.017 0v7.391c0 5.704-3.748 9.57-9 10.609l-.996-2.151c2.433-.917 3.996-2.638 3.996-5.17h-4v-10.679h10z"/>
                    </svg>
                </button>
                <button type="button"
                        data-tiptap-cmd="codeBlock"
                        title="Bloco de Código"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5"></path>
                    </svg>
                </button>

                <!-- Highlights Dropdown -->
                <div class="relative inline-block text-left tiptap-dropdown">
                    <button type="button"
                            id="tiptap-markup-btn-{{ widget.attrs.id }}"
                            class="tiptap-markup-btn px-2.5 py-1.5 bg-white border-2 border-black font-bold text-xs text-black shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center gap-1"
                            title="Marcador"
                            aria-haspopup="true"
                            aria-expanded="false">
                        <span class="tiptap-markup-icon inline-block w-3.5 h-3.5 border-2 border-black bg-white rounded-sm"></span>
                        <svg class="tiptap-chevron w-3 h-3 text-black transition-transform duration-200" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div id="tiptap-markup-menu-{{ widget.attrs.id }}"
                         class="tiptap-dropdown-menu hidden absolute left-0 mt-1 w-36 bg-white border-2 border-black shadow-[3px_3px_0_0_rgba(0,0,0,1)] z-50 flex flex-col p-1 gap-1">
                        <button type="button" data-tiptap-highlight="highlightGray" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold flex items-center justify-between text-xs text-black">
                            <div class="flex items-center gap-1.5">
                                <span class="w-3 h-3 bg-[#E2E8F0] border border-black rounded-sm"></span>
                                <span>Cinza</span>
                            </div>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                        <button type="button" data-tiptap-highlight="highlightYellow" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold flex items-center justify-between text-xs text-black">
                            <div class="flex items-center gap-1.5">
                                <span class="w-3 h-3 bg-[#FEF08A] border border-black rounded-sm"></span>
                                <span>Amarelo</span>
                            </div>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                        <button type="button" data-tiptap-highlight="highlightGreen" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold flex items-center justify-between text-xs text-black">
                            <div class="flex items-center gap-1.5">
                                <span class="w-3 h-3 bg-[#BBF7D0] border border-black rounded-sm"></span>
                                <span>Verde</span>
                            </div>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>
                    </div>
                </div>
            </div>

            <span class="w-[2px] h-6 bg-black/20 self-center mx-0.5"></span>

            <!-- Group 4: Align & Line Height -->
            <div class="flex items-center gap-1">
                <button type="button"
                        data-tiptap-align="left"
                        title="Alinhar à Esquerda"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h12m-12 5.25h16.5"></path>
                    </svg>
                </button>
                <button type="button"
                        data-tiptap-align="center"
                        title="Centralizar"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M5.25 12h13.5m-13.5 5.25h13.5"></path>
                    </svg>
                </button>
                <button type="button"
                        data-tiptap-align="right"
                        title="Alinhar à Direita"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M7.5 12h12.75m-12.75 5.25h12.75"></path>
                    </svg>
                </button>
                <button type="button"
                        data-tiptap-align="justify"
                        title="Justificar"
                        class="tiptap-btn p-1.5 bg-white border-2 border-black rounded-sm shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center justify-center">
                    <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"></path>
                    </svg>
                </button>

                <!-- Line Height Dropdown -->
                <div class="relative inline-block text-left tiptap-dropdown">
                    <button type="button"
                            id="tiptap-lineheight-btn-{{ widget.attrs.id }}"
                            class="tiptap-lineheight-btn px-2.5 py-1.5 bg-white border-2 border-black font-bold text-xs text-black shadow-[1.5px_1.5px_0_0_rgba(0,0,0,1)] active:translate-y-[0.5px] active:translate-x-[0.5px] active:shadow-none transition-all flex items-center gap-1"
                            title="Altura da Linha"
                            aria-haspopup="true"
                            aria-expanded="false">
                        <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 18h18M3 6h18M8 12h8m-8 0l3-3m-3 3l3 3m5-3l-3-3m3 3l-3 3"></path>
                        </svg>
                        <svg class="tiptap-chevron w-3 h-3 text-black transition-transform duration-200" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div id="tiptap-lineheight-menu-{{ widget.attrs.id }}"
                         class="tiptap-dropdown-menu hidden absolute left-0 mt-1 w-32 bg-white border-2 border-black shadow-[3px_3px_0_0_rgba(0,0,0,1)] z-50 flex flex-col p-1 gap-1">
                        <button type="button" data-tiptap-lineheight="normal" class="w-full text-left px-2 py-1 hover:bg-[#F1F5F9] font-bold text-xs text-black flex justify-between items-center">
                            <span>Normal (Padrão)</span>
                            <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                        </button>

    const NeoCodeBlock = CodeBlockLowlight.extend({

                    option.value = lang.value;
                    option.innerText = lang.label;
                    select.appendChild(option);

                select.addEventListener('mousedown', event => event.stopPropagation());
                select.addEventListener('change', event => {
                    const val = event.target.value === 'null' ? null : event.target.value;
                    if (typeof getPos === 'function') {

    // 1. Custom Line Height Extension

                    attributes: {
                        lineHeight: {
                            default: this.options.defaultLineHeight,
                            parseHTML: element => element.style.lineHeight || this.options.defaultLineHeight,
                            renderHTML: attributes => {
                                if (!attributes.lineHeight || attributes.lineHeight === this.options.defaultLineHeight) {
                                    return {};
                                }
                                return { style: `line-height: ${attributes.lineHeight}` };
                            },
                        },
                    },
                },
            ]

        addCommands() {
            return {
                setLineHeight: (lineHeight) => ({ commands }) => {
                    return this.options.types.every((type) => commands.updateAttributes(type, { lineHeight }))

                unsetLineHeight: () => ({ commands }) => {
                    return this.options.types.every((type) => commands.updateAttributes(type, { lineHeight: this.options.defaultLineHeight }))
                },

    });

    // 2. Custom Indent Extension (padding-left in levels of 24px)
    const Indent = Extension.create({
        name: 'indent',
        addOptions() {
            return {
                types: ['paragraph', 'heading', 'blockquote'],
                minLevel: 0,
                maxLevel: 8,
                indentSize: 24, // px
            }
        },
        addGlobalAttributes() {
            return [
                {
                    types: this.options.types,
                    attributes: {
                        indent: {
                            default: 0,
                            parseHTML: element => {
                                const paddingLeft = element.style.paddingLeft || '0px';
                                const val = parseInt(paddingLeft, 10);
                                return isNaN(val) ? 0 : Math.round(val / this.options.indentSize);
                            },
                            renderHTML: attributes => {
                                if (!attributes.indent) {
                                    return {};
                                }
                                return { style: `padding-left: ${attributes.indent * this.options.indentSize}px` };
                            },
                        },
                    },
                },
            ]
        },

                indent: () => ({ tr, state, dispatch }) => {
                    const { selection } = state;
                    tr = tr.setSelection(selection);
                    let updated = false;
                    state.doc.nodesBetween(selection.from, selection.to, (node, pos) => {
                        if (this.options.types.includes(node.type.name)) {

                                    ...node.attrs,

    const initEditor = () => {

                activeBlockValue = 'h5';
            }
            
            if (blockBtn) {
                const labelEl = blockBtn.querySelector('.tiptap-block-label');
                if (labelEl) labelEl.textContent = activeBlockLabel;
            }

            blockItems.forEach(item => {
                const val = item.getAttribute('data-tiptap-block');
                const check = item.querySelector('.tiptap-check');
                if (val === activeBlockValue) {
                    item.classList.add('bg-slate-100');
                    check?.classList.remove('hidden');
                } else {
                    item.classList.remove('bg-slate-100');
                    check?.classList.add('hidden');
                }
            });

            // 5. Font Selector dropdown
            let activeFontLabel = 'Padrão';
            let activeFontValue = 'default';
            const fontItems = fontMenu.querySelectorAll('[data-tiptap-font]');
            
            const currentFont = editor.getAttributes('textStyle').fontFamily;
            if (currentFont) {
                activeFontValue = currentFont;
                if (currentFont === 'Outfit') activeFontLabel = 'Outfit (Neo)';
                else if (currentFont === 'Inter') activeFontLabel = 'Inter (Explicar)';
                else if (currentFont === 'Space Grotesk') activeFontLabel = 'Space Grotesk';
                else if (currentFont === 'JetBrains Mono') activeFontLabel = 'JetBrains';
            }

            if (fontBtn) {
                const labelEl = fontBtn.querySelector('.tiptap-font-label');
                if (labelEl) labelEl.textContent = activeFontLabel;
            }

            fontItems.forEach(item => {
                const val = item.getAttribute('data-tiptap-font');
                const check = item.querySelector('.tiptap-check');
                if (val === activeFontValue) {
                    item.classList.add('bg-slate-100');
                    check?.classList.remove('hidden');
                } else {
                    item.classList.remove('bg-slate-100');
                    check?.classList.add('hidden');
                }
            });

            // 6. Line Height Selector dropdown
            let activeLhValue = 'normal';
            const lhItems = lhMenu.querySelectorAll('[data-tiptap-lineheight]');
            
            const { selection } = editor.state;
            editor.state.doc.nodesBetween(selection.from, selection.to, (node) => {
                if (node.attrs && node.attrs.lineHeight) {
                    activeLhValue = node.attrs.lineHeight;
                }
            });

            lhItems.forEach(item => {
                const val = item.getAttribute('data-tiptap-lineheight');
                const check = item.querySelector('.tiptap-check');
                if (val === activeLhValue) {
                    item.classList.add('bg-slate-100');
                    check?.classList.remove('hidden');
                } else {
                    item.classList.remove('bg-slate-100');
                    check?.classList.add('hidden');
                }
            });

            // 7. Highlights dropdown
            let anyHighlightActive = false;
            let activeColor = '#ffffff';
            const highlightButtons = toolbar.querySelectorAll('[data-tiptap-highlight]');

            highlightButtons.forEach(btn => {
                const highlight = btn.getAttribute('data-tiptap-highlight');
                const isActive = editor.isActive(highlight);
                const checkElement = btn.querySelector('.tiptap-check');

                if (isActive) {
                    btn.classList.add('bg-slate-100');
                    checkElement?.classList.remove('hidden');
                    anyHighlightActive = true;
                    if (highlight === 'highlightGray') activeColor = '#E2E8F0';
                    else if (highlight === 'highlightYellow') activeColor = '#FEF08A';
                    else if (highlight === 'highlightGreen') activeColor = '#BBF7D0';
                } else {
                    btn.classList.remove('bg-slate-100');
                    checkElement?.classList.add('hidden');
                }
            });

            const markupIcon = markupBtn?.querySelector('.tiptap-markup-icon');
            if (markupIcon) {
                markupIcon.style.backgroundColor = activeColor;
            }
            if (markupBtn) {
                if (anyHighlightActive) {
                    markupBtn.classList.add('bg-slate-100');
                } else {
                    markupBtn.classList.remove('bg-slate-100');
                }
            }
        };

        // Initialize TipTap Editor
        const editor = new Editor({
            element: editorElement,
            extensions: [
                StarterKit.configure({
                    codeBlock: false,
                }),
                NeoCodeBlock.configure({
                    lowlight,
                    defaultLanguage: null,
                }),
                Placeholder.configure({
                    placeholder: 'Escreva algo incrível...',
                }),
                Link.configure({
                    openOnClick: false,
                    HTMLAttributes: {
                        class: 'text-blue-600 underline font-semibold',
                    },
                }),
                TextStyle,
                FontFamily,
                TextAlign.configure({
                    types: ['heading', 'paragraph'],
                }),
                HighlightGray,
                HighlightYellow,
                HighlightGreen,
                LineHeight,
                Indent,
            ],
            content: textarea.value,
            onUpdate: ({ editor }) => {
                textarea.value = editor.getHTML();
                updateToolbarState(editor);
            },
            onSelectionUpdate: ({ editor }) => {
                updateToolbarState(editor);
            },
            onTransaction: ({ editor }) => {
                updateToolbarState(editor);
            }
        });

        // 1. Setup Toolbar Commands Listeners
        cmdButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const cmd = btn.getAttribute('data-tiptap-cmd');

                if (cmd === 'undo') {
                    editor.chain().focus().undo().run();
                } else if (cmd === 'redo') {
                    editor.chain().focus().redo().run();
                } else if (cmd === 'bold') {
                    editor.chain().focus().toggleBold().run();
                } else if (cmd === 'italic') {
                    editor.chain().focus().toggleItalic().run();
                } else if (cmd === 'strike') {
                    editor.chain().focus().toggleStrike().run();
                } else if (cmd === 'blockquote') {
                    editor.chain().focus().toggleBlockquote().run();
                } else if (cmd === 'codeBlock') {
                    editor.chain().focus().toggleCodeBlock().run();
                } else if (cmd === 'bulletList') {
                    editor.chain().focus().toggleBulletList().run();
                } else if (cmd === 'orderedList') {
                    editor.chain().focus().toggleOrderedList().run();
                }
            });
        });

        // 2. Setup Alignment Commands Listeners
        alignButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const align = btn.getAttribute('data-tiptap-align');
                editor.chain().focus().setTextAlign(align).run();
            });
        });

        // 3. Setup Indentation Commands Listeners
        indentButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const type = btn.getAttribute('data-tiptap-indent');
                if (type === 'indent') {
                    editor.chain().focus().indent().run();
                } else {
                    editor.chain().focus().outdent().run();
                }
            });
        });

        // 4. Setup Block Dropdown Actions
        blockMenu.querySelectorAll('[data-tiptap-block]').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const val = item.getAttribute('data-tiptap-block');
                
                if (val === 'paragraph') {
                    editor.chain().focus().setParagraph().run();
                } else {
                    const level = parseInt(val.replace('h', ''));
                    editor.chain().focus().toggleHeading({ level }).run();
                }
                blockMenu.classList.add('hidden');
                blockBtn.setAttribute('aria-expanded', 'false');
                blockBtn.querySelector('.tiptap-chevron')?.classList.remove('rotate-180');
            });
        });

        // 5. Setup Font Dropdown Actions
        fontMenu.querySelectorAll('[data-tiptap-font]').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const val = item.getAttribute('data-tiptap-font');
                
                if (val === 'default') {
                    editor.chain().focus().unsetFontFamily().run();
                } else {
                    editor.chain().focus().setFontFamily(val).run();
                }
                fontMenu.classList.add('hidden');
                fontBtn.setAttribute('aria-expanded', 'false');
                fontBtn.querySelector('.tiptap-chevron')?.classList.remove('rotate-180');
            });
        });

        // 6. Setup Line Height Dropdown Actions
        lhMenu.querySelectorAll('[data-tiptap-lineheight]').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const val = item.getAttribute('data-tiptap-lineheight');
                
                if (val === 'normal') {
                    editor.chain().focus().unsetLineHeight().run();
                } else {
                    editor.chain().focus().setLineHeight(val).run();
                }
                lhMenu.classList.add('hidden');
                lhBtn.setAttribute('aria-expanded', 'false');
                lhBtn.querySelector('.tiptap-chevron')?.classList.remove('rotate-180');
            });
        });

        // 7. Setup Highlight Menu Actions
        toolbar.querySelectorAll('[data-tiptap-highlight]').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const highlight = item.getAttribute('data-tiptap-highlight');
                if (highlight === 'highlightGray') {
                    editor.chain().focus().toggleHighlightGray().run();
                } else if (highlight === 'highlightYellow') {
                    editor.chain().focus().toggleHighlightYellow().run();
                } else if (highlight === 'highlightGreen') {
                    editor.chain().focus().toggleHighlightGreen().run();
                }
                markupMenu.classList.add('hidden');
                markupBtn.setAttribute('aria-expanded', 'false');
                markupBtn.querySelector('.tiptap-chevron')?.classList.remove('rotate-180');
            });
        });

        // 8. Link Dialog Logic
        const openLinkModal = () => {
            const { state } = editor;
            const { from, to } = state.selection;
            const selectedText = state.doc.textBetween(from, to, ' ');
            
            let url = '';
            const isLinkActive = editor.isActive('link');
            if (isLinkActive) {
                url = editor.getAttributes('link').href || '';
            }
            
            linkText.value = selectedText;
            linkUrl.value = url;
            
            linkModal.showModal();
            // Automatically focus URL input
            setTimeout(() => linkUrl.focus(), 50);
        };

        const closeLinkModal = () => {
            linkModal.close();
            editor.commands.focus();
        };

        if (linkTrigger) {
            linkTrigger.addEventListener('click', (e) => {
                e.preventDefault();
                openLinkModal();
            });
        }

        if (linkCancel) {
            linkCancel.addEventListener('click', (e) => {
                e.preventDefault();
                closeLinkModal();
            });
        }

        // Handle Escape natively on the dialog, but let's register keydown on input elements for better UX
        linkModal.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLinkModal();
            }
        });

        // Form Submit / Save link
        if (linkSave) {
            linkSave.addEventListener('click', (e) => {
                e.preventDefault();
                const text = linkText.value.trim();
                let url = linkUrl.value.trim();
                
                if (!url) {
                    editor.chain().focus().unsetLink().run();
                    closeLinkModal();
                    return;
                }
                
                // Prepend https:// if no protocol is given, but allow relative paths
                if (!/^https?:\/\//i.test(url) && !/^\//.test(url) && !/^mailto:/i.test(url) && !/^tel:/i.test(url)) {
                    url = 'https://' + url;
                }
                
                const { state } = editor;
                const { from, to } = state.selection;
                const selectedText = state.doc.textBetween(from, to, ' ');
                
                if (from === to) {
                    const display = text || url;
                    editor.chain().focus().insertContent(`<a href="${url}">${display}</a>`).run();
                } else {
                    if (text && text !== selectedText) {
                        editor.chain().focus().insertContentAt({ from, to }, `<a href="${url}">${text}</a>`).run();
                    } else {
                        editor.chain().focus().setLink({ href: url }).run();
                    }
                }
                closeLinkModal();
            });
        }

        // Close on backdrop click (Light dismiss fallback)
        if (!('closedBy' in HTMLDialogElement.prototype)) {
            linkModal.addEventListener('click', (event) => {
                if (event.target !== linkModal) return;
                const rect = linkModal.getBoundingClientRect();
                const isDialogContent = (
                    rect.top <= event.clientY &&
                    event.clientY <= rect.top + rect.height &&
                    rect.left <= event.clientX &&
                    event.clientX <= rect.left + rect.width
                );
                if (!isDialogContent) {
                    closeLinkModal();
                }
            });
        }

        // 9. Keyboard shortcut Ctrl+K / Cmd+K inside the editor
        editorElement.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
                e.preventDefault();
                openLinkModal();
            }
        });
    };

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initEditor);
    } else {
        initEditor();
    }
    </script>
</div>
