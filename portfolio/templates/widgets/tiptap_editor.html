<div class="tiptap-editor-container">
    {% include "django/forms/widgets/textarea.html" %}

    <div class="tiptap-editor-mount w-full border-4 border-black bg-[#E2E8F0] shadow-[4px_4px_0_0_rgba(0,0,0,1)] rounded-sm mb-4 mt-2">
        <!-- Toolbar -->
        <div class="tiptap-toolbar flex flex-wrap gap-2 p-2 bg-[#F1F5F9] border-b-4 border-black">
            <button type="button"
                    data-tiptap-cmd="bold"
                    class="px-3 py-1 bg-white border-2 border-black font-bold shadow-[2px_2px_0_0_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
                B
            </button>
            <button type="button"
                    data-tiptap-cmd="italic"
                    class="px-3 py-1 bg-white border-2 border-black italic shadow-[2px_2px_0_0_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
                I
            </button>
            <button type="button"
                    data-tiptap-cmd="strike"
                    class="px-3 py-1 bg-white border-2 border-black line-through shadow-[2px_2px_0_0_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
                S
            </button>
            <button type="button"
                    data-tiptap-cmd="heading"
                    data-level="2"
                    class="px-3 py-1 bg-white border-2 border-black font-bold shadow-[2px_2px_0_0_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
                H2
            </button>
            <button type="button"
                    data-tiptap-cmd="heading"
                    data-level="3"
                    class="px-3 py-1 bg-white border-2 border-black font-bold shadow-[2px_2px_0_0_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
                H3
            </button>
            <button type="button"
                    data-tiptap-cmd="bulletList"
                    class="px-3 py-1 bg-white border-2 border-black font-bold shadow-[2px_2px_0_0_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
                • Lista
            </button>
            <button type="button"
                    data-tiptap-cmd="orderedList"
                    class="px-3 py-1 bg-white border-2 border-black font-bold shadow-[2px_2px_0_0_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all">
                1. Lista
            </button>

            <!-- Highlights Neo-Brutalist Dropdown -->
            <span class="border-l-2 border-black mx-1"></span>
            <div class="relative inline-block text-left tiptap-dropdown">
                <button type="button"
                        id="tiptap-markup-btn-{{ widget.attrs.id }}"
                        class="tiptap-markup-btn px-3 py-1 bg-white border-2 border-black font-bold shadow-[2px_2px_0_0_rgba(0,0,0,1)] active:translate-y-[2px] active:translate-x-[2px] active:shadow-none transition-all flex items-center gap-2"
                        aria-haspopup="true"
                        aria-expanded="false">
                    <span class="tiptap-markup-icon inline-block w-4 h-4 border-2 border-black bg-white rounded-sm"></span>
                    <span>Marcador</span>
                    <svg class="w-4 h-4 transition-transform duration-200" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
                <div id="tiptap-markup-menu-{{ widget.attrs.id }}"
                     class="tiptap-markup-menu hidden absolute left-0 mt-2 w-44 bg-white border-2 border-black shadow-[4px_4px_0_0_rgba(0,0,0,1)] z-50 flex flex-col p-1 gap-1">
                    <button type="button"
                            data-tiptap-highlight="highlightGray"
                            class="w-full text-left px-3 py-1.5 hover:bg-[#F1F5F9] transition-colors font-bold flex items-center justify-between text-sm">
                        <div class="flex items-center gap-2">
                            <span class="w-4 h-4 bg-[#E2E8F0] border-2 border-black rounded-sm"></span>
                            <span>Cinza</span>
                        </div>
                        <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                    </button>
                    <button type="button"
                            data-tiptap-highlight="highlightYellow"
                            class="w-full text-left px-3 py-1.5 hover:bg-[#F1F5F9] transition-colors font-bold flex items-center justify-between text-sm">
                        <div class="flex items-center gap-2">
                            <span class="w-4 h-4 bg-[#FEF08A] border-2 border-black rounded-sm"></span>
                            <span>Amarelo</span>
                        </div>
                        <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                    </button>
                    <button type="button"
                            data-tiptap-highlight="highlightGreen"
                            class="w-full text-left px-3 py-1.5 hover:bg-[#F1F5F9] transition-colors font-bold flex items-center justify-between text-sm">
                        <div class="flex items-center gap-2">
                            <span class="w-4 h-4 bg-[#BBF7D0] border-2 border-black rounded-sm"></span>
                            <span>Verde</span>
                        </div>
                        <span class="tiptap-check hidden text-green-600 font-bold">✓</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Editor Content Area -->
        <div class="tiptap-content-area bg-white min-h-[200px] text-base p-4 focus:outline-none"></div>
    </div>

    <style>
    /* TipTap styles */
    .tiptap-editor-mount .ProseMirror {
        min-height: 200px;
        outline: none;
    }
    .tiptap-editor-mount .ProseMirror p {
        margin-bottom: 1em;
    }
    .tiptap-editor-mount .ProseMirror p.is-editor-empty:first-child::before {
        color: #9CA3AF;
        content: attr(data-placeholder);
        float: left;
        height: 0;
        pointer-events: none;
    }
    .tiptap-editor-mount .ProseMirror h2 {
        font-size: 1.5em;
        font-weight: bold;
        margin-top: 1em;
        margin-bottom: 0.5em;
    }
    .tiptap-editor-mount .ProseMirror h3 {
        font-size: 1.17em;
        font-weight: bold;
        margin-top: 1em;
        margin-bottom: 0.5em;
    }
    .tiptap-editor-mount .ProseMirror ul {
        list-style-type: disc;
        padding-left: 1.5em;
        margin-bottom: 1em;
    }
    .tiptap-editor-mount .ProseMirror ol {
        list-style-type: decimal;
        padding-left: 1.5em;
        margin-bottom: 1em;
    }
    /* Using highlight-neo-* global classes from app.css */
    </style>

    <script type="module">
    import { Editor, Mark, mergeAttributes } from 'https://esm.sh/@tiptap/core';
    import StarterKit from 'https://esm.sh/@tiptap/starter-kit';
    import Placeholder from 'https://esm.sh/@tiptap/extension-placeholder';

    // Custom Highlights Marks
    const HighlightGray = Mark.create({
        name: 'highlightGray',
        parseHTML() {
            return [{ tag: 'mark.highlight-neo-gray' }, { tag: 'mark.highlight-gray' }]
        },
        renderHTML({ HTMLAttributes }) {
            return ['mark', mergeAttributes(HTMLAttributes, { class: 'highlight-neo-gray' }), 0]
        },
        addCommands() {
            return {
                toggleHighlightGray: () => ({ commands }) => {
                    return commands.toggleMark(this.name)
                },
            }
        },
    });

    const HighlightYellow = Mark.create({
        name: 'highlightYellow',
        parseHTML() {
            return [{ tag: 'mark.highlight-neo-yellow' }, { tag: 'mark.highlight-yellow' }]
        },
        renderHTML({ HTMLAttributes }) {
            return ['mark', mergeAttributes(HTMLAttributes, { class: 'highlight-neo-yellow' }), 0]
        },
        addCommands() {
            return {
                toggleHighlightYellow: () => ({ commands }) => {
                    return commands.toggleMark(this.name)
                },
            }
        },
    });

    const HighlightGreen = Mark.create({
        name: 'highlightGreen',
        parseHTML() {
            return [{ tag: 'mark.highlight-neo-green' }, { tag: 'mark.highlight-green' }]
        },
        renderHTML({ HTMLAttributes }) {
            return ['mark', mergeAttributes(HTMLAttributes, { class: 'highlight-neo-green' }), 0]
        },
        addCommands() {
            return {
                toggleHighlightGreen: () => ({ commands }) => {
                    return commands.toggleMark(this.name)
                },
            }
        },
    });

    const initEditor = () => {
        const textareaId = "{{ widget.attrs.id|default:'' }}";
        if (!textareaId) return;
        
        const textarea = document.getElementById(textareaId);
        if (!textarea) return;
        
        // Hide textarea as fallback
        textarea.style.display = 'none';

        const container = textarea.closest('.tiptap-editor-container') || textarea.parentElement;
        const editorMount = container.querySelector('.tiptap-editor-mount');
        if (!editorMount) return;
        const editorElement = editorMount.querySelector('.tiptap-content-area');
        const toolbar = editorMount.querySelector('.tiptap-toolbar');

        // Cache elements for maximum performance
        const cmdButtons = toolbar.querySelectorAll('[data-tiptap-cmd]');
        const highlightButtons = toolbar.querySelectorAll('[data-tiptap-highlight]');
        const markupBtn = toolbar.querySelector('.tiptap-markup-btn');
        const markupMenu = toolbar.querySelector('.tiptap-markup-menu');

        const updateToolbarState = (editor) => {
            // Update standard command buttons
            cmdButtons.forEach(btn => {
                const cmd = btn.getAttribute('data-tiptap-cmd');
                const level = btn.getAttribute('data-level');
                
                let isActive = false;
                if (level) {
                    isActive = editor.isActive(cmd, { level: parseInt(level) });
                } else {
                    isActive = editor.isActive(cmd);
                }

                if (isActive) {
                    btn.classList.add('bg-black', 'text-white');
                    btn.classList.remove('bg-white', 'text-black');
                } else {
                    btn.classList.remove('bg-black', 'text-white');
                    btn.classList.add('bg-white', 'text-black');
                }
            });

            // Update highlight dropdown menu items and main button state
            let anyHighlightActive = false;
            let activeColor = '#ffffff'; // default white
            
            highlightButtons.forEach(btn => {
                const highlight = btn.getAttribute('data-tiptap-highlight');
                const isActive = editor.isActive(highlight);
                const checkElement = btn.querySelector('.tiptap-check');

                if (isActive) {
                    btn.classList.add('bg-slate-100');
                    if (checkElement) {
                        checkElement.classList.remove('hidden');
                    }
                    anyHighlightActive = true;
                    if (highlight === 'highlightGray') activeColor = '#E2E8F0';
                    else if (highlight === 'highlightYellow') activeColor = '#FEF08A';
                    else if (highlight === 'highlightGreen') activeColor = '#BBF7D0';
                } else {
                    btn.classList.remove('bg-slate-100');
                    if (checkElement) {
                        checkElement.classList.add('hidden');
                    }
                }
            });

            // Update main button icon color swatch
            const markupIcon = markupBtn ? markupBtn.querySelector('.tiptap-markup-icon') : null;
            if (markupIcon) {
                markupIcon.style.backgroundColor = activeColor;
            }

            if (markupBtn) {
                if (anyHighlightActive) {
                    markupBtn.classList.add('bg-slate-100');
                } else {
                    markupBtn.classList.remove('bg-slate-100');
                }
            }
        };

        const editor = new Editor({
            element: editorElement,
            extensions: [
                StarterKit,
                Placeholder.configure({
                    placeholder: 'Escreva algo incrível...',
                }),
                HighlightGray,
                HighlightYellow,
                HighlightGreen,
            ],
            content: textarea.value,
            onUpdate: ({ editor }) => {
                textarea.value = editor.getHTML();
                updateToolbarState(editor);
            },
            onSelectionUpdate: ({ editor }) => {
                updateToolbarState(editor);
            },
            onTransaction: ({ editor }) => {
                updateToolbarState(editor);
            }
        });

        // Setup toolbar actions
        cmdButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const cmd = btn.getAttribute('data-tiptap-cmd');
                const level = btn.getAttribute('data-level');

                if (cmd === 'heading') {
                    editor.chain().focus().toggleHeading({ level: parseInt(level) }).run();
                } else if (cmd === 'bold') {
                    editor.chain().focus().toggleBold().run();
                } else if (cmd === 'italic') {
                    editor.chain().focus().toggleItalic().run();
                } else if (cmd === 'strike') {
                    editor.chain().focus().toggleStrike().run();
                } else if (cmd === 'bulletList') {
                    editor.chain().focus().toggleBulletList().run();
                } else if (cmd === 'orderedList') {
                    editor.chain().focus().toggleOrderedList().run();
                }
            });
        });

        // Setup dropdown toggle logic
        if (markupBtn && markupMenu) {
            markupBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const isExpanded = markupBtn.getAttribute('aria-expanded') === 'true';
                markupBtn.setAttribute('aria-expanded', !isExpanded);
                markupMenu.classList.toggle('hidden');
                
                // Toggle chevron rotation
                const chevron = markupBtn.querySelector('svg');
                if (chevron) {
                    chevron.classList.toggle('rotate-180');
                }
            });

            // Close when clicking outside
            document.addEventListener('click', (e) => {
                if (!markupBtn.contains(e.target) && !markupMenu.contains(e.target)) {
                    markupBtn.setAttribute('aria-expanded', 'false');
                    markupMenu.classList.add('hidden');
                    const chevron = markupBtn.querySelector('svg');
                    if (chevron) {
                        chevron.classList.remove('rotate-180');
                    }
                }
            });
        }

        highlightButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const highlight = btn.getAttribute('data-tiptap-highlight');
                if (highlight === 'highlightGray') {
                    editor.chain().focus().toggleHighlightGray().run();
                } else if (highlight === 'highlightYellow') {
                    editor.chain().focus().toggleHighlightYellow().run();
                } else if (highlight === 'highlightGreen') {
                    editor.chain().focus().toggleHighlightGreen().run();
                }

                // Close dropdown after selection
                if (markupBtn && markupMenu) {
                    markupBtn.setAttribute('aria-expanded', 'false');
                    markupMenu.classList.add('hidden');
                    const chevron = markupBtn.querySelector('svg');
                    if (chevron) {
                        chevron.classList.remove('rotate-180');
                    }
                }
            });
        });
    };

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initEditor);
    } else {
        initEditor();
    }
    </script>
</div>
